services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: incident-commander-postgres
    environment:
      POSTGRES_DB: incident_commander
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident -d incident_commander"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: incident-commander-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: incident-commander-api
    environment:
      INCIDENT_STORE_BACKEND: database
      DATABASE_URL: postgresql+psycopg://incident:incident@postgres:5432/incident_commander
      EMBEDDING_PROVIDER: hash
      LLM_PROVIDER: deterministic
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head
      && python -m backend.app.seed_database
      && python -m backend.app.ingest_runbooks
      && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: incident-commander-frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: incident-commander-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: incident-commander-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: incident-commander-ollama
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  ollama_data:

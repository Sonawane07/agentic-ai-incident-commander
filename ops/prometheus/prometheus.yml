global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Day 6 adds the FastAPI /metrics endpoint.
  - job_name: incident-commander-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
